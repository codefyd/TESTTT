<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة الوكالة</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="container py-4">
    <div id="loginPage" class="login-wrap">
      <div class="login-card">
        <div class="text-center mb-4">
          <div class="brand-icon mb-3"><i class="fas fa-layer-group"></i></div>
          <h1 class="h3 fw-bold mb-2">بوابة الوكالة</h1>
          <p class="text-muted mb-0">نسخة GitHub Pages مرتبطة بـ Google Apps Script API</p>
        </div>

        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">رمز الدخول</label>
            <input id="code" class="form-control form-control-lg" placeholder="أدخل رمز الدخول" autocomplete="off" />
          </div>
          <button class="btn btn-main w-100" type="submit" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i>
            <span id="loginBtnText">دخول</span>
          </button>
        </form>

        <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>
        <div class="status-line mt-3">الحالة: <span id="statusText">جاهز</span></div>
      </div>
    </div>

    <div id="mainApp" class="d-none">
      <div class="gradient-header mb-4">
        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
          <div>
            <h1 class="app-title mb-2">لوحة التحكم</h1>
            <p class="app-subtitle mb-0">تم نقل الواجهة إلى GitHub وبقيت البيانات على Google Sheets / Apps Script</p>
          </div>
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <span class="badge text-bg-light px-3 py-2">المستخدم: <span id="currentUserNameValue">-</span></span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">
              <i class="fas fa-right-from-bracket"></i> خروج
            </button>
          </div>
        </div>
      </div>

      <ul class="nav nav-pills gap-2 mb-4" id="mainTabs" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" id="dashboard-tab" data-bs-toggle="tab" data-bs-target="#dashboard" type="button">
            لوحة التحكم
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="bookings-tab" data-bs-toggle="tab" data-bs-target="#bookings" type="button">
            الحجوزات
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="dashboard">
          <div class="row g-3">
            <div class="col-12 col-md-6 col-xl-3">
              <div class="stat-card">
                <div class="stat-label">إجمالي الحجوزات</div>
                <div class="stat-value" id="dash-bookings-total">0</div>
              </div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
              <div class="stat-card">
                <div class="stat-label">إجمالي الإيرادات</div>
                <div class="stat-value" id="dash-total-revenue">0</div>
              </div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
              <div class="stat-card">
                <div class="stat-label">المستحقات</div>
                <div class="stat-value" id="dash-receivables">0</div>
              </div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
              <div class="stat-card">
                <div class="stat-label">صافي الربح</div>
                <div class="stat-value" id="dash-net-profit">0</div>
              </div>
            </div>
          </div>
        </div>

        <div class="tab-pane fade" id="bookings">
          <div class="row g-4">
            <div class="col-12 col-xl-8">
              <div class="card-soft">
                <div id="calendar"></div>
              </div>
            </div>
            <div class="col-12 col-xl-4">
              <div class="card-soft">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h5 class="mb-0">حجوزات اليوم</h5>
                  <span id="modalDate" class="text-muted small">—</span>
                </div>
                <input type="hidden" id="selectedDate">
                <div id="dayEventsList" class="vstack gap-2"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/dashboard.js"></script>
  <script src="assets/js/bookings.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
